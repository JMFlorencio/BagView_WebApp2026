<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --scanning: #ffaa00; --error: #ff4444; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Fixed Video Feed */
        .mindar-ui-overlay { z-index: 50 !important; }
        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: -5 !important; }

        /* Loading UI */
        #ar-loading { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* [Existing Styles Restored Below] */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
        .top-nav, .bottom-area, .icon-btn, .cam-btn, .station-card, #inquiry-panel { pointer-events: auto; }
        .overlay-screen { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hidden { display: none !important; }
        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #444; display: flex; align-items: center; gap: 10px; }
        .pulse { width: 8px; height: 8px; background: #444; border-radius: 50%; }
        .pulse.live { background: var(--scanning); animation: pulse-scanning 1.5s infinite; }
        .bottom-dock { position: absolute; bottom: 0; width: 100vw; background: linear-gradient(to top, rgba(0,0,0,0.95) 80%, transparent); transition: 0.6s; transform: translateY(calc(100% - 45px)); z-index: 120; padding-bottom: 120px; }
        .bottom-dock.expanded { transform: translateY(0); }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .station-card { min-width: 100px; height: 130px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 150; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); }
        #webview-container { position: fixed; inset: 0; z-index: 3000; background: #000; display: none; flex-direction: column; }
        @keyframes pulse-scanning { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="ar-loading">
        <div class="spinner"></div>
        <p style="letter-spacing: 3px; font-size: 10px; font-weight: 900;">INITIALIZING AR ENGINE...</p>
    </div>

    <audio id="match-sound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb630cc098.mp3" preload="auto"></audio>

    <div id="webview-container">
        <div style="background:#111; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <span id="web-title" style="color:var(--accent); font-weight:900; font-size: 12px;">STATION INFO</span>
            <button onclick="closeWebView()" style="background:var(--accent); border:none; color:#000; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 10px;">CLOSE</button>
        </div>
        <iframe id="web-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="home-page" class="overlay-screen">
        <h1 style="font-size:48px; margin:0; letter-spacing:8px; font-weight:900;">BAG<span style="color:var(--accent)">VIEW</span></h1>
        <p style="color:#555; letter-spacing:5px; font-size:10px;">ENVIRONMENTAL AR GUIDE</p>
        <button onclick="goToTutorial()" style="background:var(--accent); border:none; padding:18px 60px; border-radius:50px; font-weight:900; margin-top:100px; cursor:pointer; color:#000;">EXPLORE</button>
    </div>

    <div id="tutorial-page" class="overlay-screen hidden">
        <div style="width: 80%; text-align: center;">
            <p style="font-size: 12px; margin-bottom: 20px; letter-spacing: 2px;">READY TO SCAN THE GARDEN?</p>
            <button onclick="finishTutorial()" style="background:white; color:black; border:none; padding:15px 40px; border-radius:50px; font-weight:900; cursor:pointer;">START CAMERA ➔</button>
        </div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="top-nav">
            <div class="gps-display" id="status-container">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:11px; font-weight:900; letter-spacing:1px;">CAMERA: STANDBY</div>
            </div>
        </div>
        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="drag-handle" onclick="document.getElementById('gallery-hud').classList.toggle('expanded')" style="height: 40px; display: flex; justify-content: center; align-items: center;"><div style="width: 40px; height: 4px; background: #333; border-radius: 2px;"></div></div>
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div class="icon-btn" onclick="location.reload()" style="background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><svg viewBox="0 0 24 24" width="20" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></div>
                <div class="cam-btn" id="cam-toggle" onclick="toggleScanner()"><svg viewBox="0 0 24 24" width="30" fill="white"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
            </div>
        </div>
    </div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
        // 1. FIREBASE (Ensure your keys are here)
        const firebaseConfig = { apiKey: "YOUR_KEY", authDomain: "your.firebaseapp.com", databaseURL: "your-url", projectId: "your-id", storageBucket: "your-bucket", messagingSenderId: "123", appId: "1:123" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. DATA
        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg", link: "https://jmflorencio.github.io/BagView_Botanical_Map/" },
            { name: "Japanese Tunnel", thumb: "Assets/Japanese%20Tunnel.png", link: "https://tour.panoee.net/69b7b616a3e4d72922c8db49" }
            // ... add the rest of your stations here
        ];

        // 3. CORE LOGIC
        function buildUI() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}" onclick="handleCardTap(${i})">
                    <img src="${s.thumb}" style="width:100%; height:75%; object-fit:cover;">
                    <div style="font-size:7px; text-align:center; padding:5px; font-weight:bold;">${s.name}</div>
                </div>`).join('');
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            const sceneEl = document.querySelector('a-scene');
            const loading = document.getElementById('ar-loading');

            if(!btn.classList.contains('active')) {
                loading.style.display = 'flex'; // Show loading while camera starts
                try {
                    const arSystem = sceneEl.systems['mindar-image-system'];
                    await arSystem.start();
                    btn.classList.add('active');
                    updateStatusUI('scanning');
                    loading.style.display = 'none';
                } catch (e) {
                    loading.style.display = 'none';
                    alert("Webcam access denied or error. Please use HTTPS.");
                }
            } else {
                sceneEl.systems['mindar-image-system'].stop();
                btn.classList.remove('active');
                updateStatusUI('standby');
            }
        }

        function setupTracking() {
            const container = document.getElementById('target-container');
            stations.forEach((s, i) => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
                entity.addEventListener("targetFound", () => {
                    document.getElementById('match-sound').play();
                    updateStatusUI('match');
                    openStation(i);
                });
                entity.addEventListener("targetLost", () => updateStatusUI('scanning'));
                container.appendChild(entity);
            });
        }

        function updateStatusUI(type) {
            const statusPulse = document.getElementById('status-pulse');
            const statusText = document.getElementById('gps-status');
            if (type === 'scanning') { statusPulse.className = 'pulse live'; statusText.innerText = "SCANNING..."; }
            else if (type === 'match') { statusText.innerText = "MATCH FOUND!"; }
            else { statusPulse.className = 'pulse'; statusText.innerText = "STANDBY"; }
        }

        function openStation(i) {
            document.getElementById('web-frame').src = stations[i].link;
            document.getElementById('web-title').innerText = stations[i].name.toUpperCase();
            document.getElementById('webview-container').style.display = 'flex';
        }

        function closeWebView() { document.getElementById('webview-container').style.display = 'none'; document.getElementById('web-frame').src = ''; }
        function goToTutorial() { document.getElementById('home-page').classList.add('hidden'); document.getElementById('tutorial-page').classList.remove('hidden'); }
        
        function finishTutorial() { 
            document.getElementById('tutorial-page').classList.add('hidden'); 
            document.getElementById('ui-layer').classList.remove('hidden'); 
            buildUI(); 
            setupTracking(); 
            toggleScanner(); // FORCE START CAMERA IMMEDIATELY
        }
    </script>
</body>
</html>
