<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* [EXISTING STYLES REMAIN UNCHANGED] */
        :root { --accent: #00ff88; --scanning: #ffaa00; --error: #ff4444; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        /* ... all other styles ... */
    </style>
</head>
<body>

    <script>
        // 1. FIREBASE CONFIGURATION
        // Replace these values with the ones from your Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ANALYTICS ENGINE
        const analytics = {
            sessionID: 'User-' + Math.random().toString(36).substr(2, 5),
            activeStation: null,
            openTime: null,

            logEvent(stationName, eventType, extra = {}) {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((position) => {
                        const payload = {
                            userId: this.sessionID,
                            station: stationName,
                            event: eventType,
                            location: `${position.coords.latitude}, ${position.coords.longitude}`,
                            timestamp: new Date().toISOString(),
                            ...extra
                        };
                        db.ref('stats').push(payload);
                    }, () => {
                        // Fallback if GPS is denied
                        db.ref('stats').push({
                            userId: this.sessionID,
                            station: stationName,
                            event: eventType,
                            location: "GPS Denied",
                            timestamp: new Date().toISOString(),
                            ...extra
                        });
                    });
                }
            },

            startDwell(stationName) {
                this.activeStation = stationName;
                this.openTime = Date.now();
                this.logEvent(stationName, 'scan');
            },

            endDwell() {
                if (this.activeStation && this.openTime) {
                    const duration = Math.round((Date.now() - this.openTime) / 1000);
                    if (duration > 1) { // Only log if they stayed more than 1 second
                        this.logEvent(this.activeStation, 'dwell', { duration: duration });
                    }
                    this.activeStation = null;
                    this.openTime = null;
                }
            }
        };

        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg", link: "https://jmflorencio.github.io/BagView_Botanical_Map/" },
            { name: "Arbor", thumb: "Assets/Arbor.png", link: "https://tour.panoee.net/69b7b676cd5918466513b640" },
            { name: "Cactus & Succulents", thumb: "Assets/Cactus&Succulents.png", link: "https://tour.panoee.net/69b7b991cd59184ead13b71f" },
            { name: "Chinese Garden", thumb: "Assets/Chinese%20Garden.png", link: "https://tour.panoee.net/69b74a8ccd5918bff013a943" },
            { name: "Friendship Garden", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png", link: "https://tour.panoee.net/69b7b820a3e4d78d0cc8db9e" },
            { name: "Cordillera Village", thumb: "Assets/Cordillera%20Village.png", link: "https://tour.panoee.net/69b7b964a3e4d75529c8dc1a" },
            { name: "Greenhouse", thumb: "Assets/Greenhouse.png", link: "https://tour.panoee.net/69b7b91fa3e4d7ebe6c8dbfe" },
            { name: "Japanese Garden", thumb: "Assets/Japanese%20Garden.png", link: "https://tour.panoee.net/69b7b63aa3e4d733edc8db51" },
            { name: "Japanese Tunnel", thumb: "Assets/Japanese%20Tunnel.png", link: "https://tour.panoee.net/69b7b616a3e4d72922c8db49" },
            { name: "Korea Garden", thumb: "Assets/Korea%20Garden.png", link: "https://tour.panoee.net/69aa67e9add064456619ce3d/69aa73d3add0647cc419cf6d" },
            { name: "Orchidarium", thumb: "Assets/Orchidarium.png", link: "https://tour.panoee.net/69b184dfa0e1d16f1a9e388d/69b187aba0e1d18afb9e38fb" },
            { name: "PMSEA Garden", thumb: "Assets/PMSEA%20Garden.png", link: "https://tour.panoee.net/69b7b586a3e4d741fdc8db26" }
        ];

        // ... [KEEP buildUI, handleCardTap, updateStatusUI functions as they were] ...

        function setupTracking() {
            const container = document.getElementById('target-container');
            container.innerHTML = "";
            stations.forEach((s, i) => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
                
                entity.addEventListener("targetFound", () => {
                    if ("vibrate" in navigator) { navigator.vibrate([100, 50, 100]); }
                    const sound = document.getElementById('match-sound');
                    sound.currentTime = 0;
                    sound.play();

                    updateStatusUI('match');
                    hud.classList.add('expanded'); 
                    handleCardTap(i); 

                    // LOG THE SCAN TO FIREBASE
                    analytics.startDwell(s.name);

                    if (s.link && s.link !== "") {
                        openStation(i); 
                    }
                });

                entity.addEventListener("targetLost", () => {
                    updateStatusUI('scanning');
                });

                container.appendChild(entity);
            });
        }

        function openStation(index) {
            const s = stations[index];
            document.getElementById('web-frame').src = s.link;
            document.getElementById('web-title').innerText = s.name.toUpperCase() + " INFO";
            document.getElementById('webview-container').style.display = 'flex';
        }

        function closeWebView() { 
            // LOG DURATION WHEN CLOSED
            analytics.endDwell();
            document.getElementById('webview-container').style.display = 'none'; 
            document.getElementById('web-frame').src = ''; 
        }

        // ... [KEEP ALL OTHER FUNCTIONS LIKE toggleScanner, goToTutorial, etc.] ...

    </script>
</body>
</html>
