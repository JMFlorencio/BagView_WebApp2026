<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --scanning: #ffaa00; --error: #ff4444; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: -5 !important; display: block !important; }
        a-scene { background: none !important; background-color: transparent !important; }
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; transition: 0.5s; background: transparent !important; }
        .top-nav, .bottom-area, .icon-btn, .cam-btn, .station-card, #inquiry-panel { pointer-events: auto; }
        .overlay-screen { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.8s ease; }
        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }
        .video-container { width: 90%; max-width: 600px; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; border: 1px solid var(--accent); position: relative; background: #050505; }
        .tut-vid { width: 100%; height: 100%; object-fit: cover; }
        .skip-fab { margin-top: 25px; background: rgba(255,255,255,0.05); padding: 12px 35px; border-radius: 50px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); font-size: 10px; letter-spacing: 2px; font-weight: 900; }
        .top-nav { position: absolute; top: 0; left: 0; right: 0; padding: 30px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; border-left: 3px solid #444; display: flex; align-items: center; gap: 10px; min-width: 160px; }
        .gps-display.status-live { border-left-color: var(--scanning); }
        .gps-display.status-match { border-left-color: var(--accent); }
        .pulse { width: 8px; height: 8px; background: #444; border-radius: 50%; } 
        .pulse.live { background: var(--scanning); animation: pulse-scanning 1.5s infinite; }
        .pulse.match { background: var(--accent); animation: pulse-match 0.5s infinite alternate; }
        #inquiry-panel { position: fixed; inset: 0; z-index: 5500; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; padding: 40px 20px; flex-direction: column; overflow-y: auto; }
        .inquiry-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 2px solid var(--accent); }
        .bottom-dock { position: absolute; bottom: 0; width: 100vw; background: linear-gradient(to top, rgba(0,0,0,0.95) 80%, transparent); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); transform: translateY(calc(100% - 45px)); z-index: 120; padding-bottom: 120px; }
        .bottom-dock.expanded { transform: translateY(0); }
        .drag-handle { width: 100%; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .handle-bar { width: 45px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 10px; }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 20px 20px; scrollbar-width: none; width: 100%; }
        .station-card { min-width: 100px; height: 130px; background: #111; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; transition: 0.4s; }
        .station-card.react { transform: translateY(-10px); border-color: var(--accent); }
        .nav-bar { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 150; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .cam-btn { width: 75px; height: 75px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .cam-btn.active { border-color: var(--accent); background: var(--accent); }
        #webview-container { position: fixed; inset: 0; z-index: 3000; background: #000; display: none; flex-direction: column; }
        #shutter { position: fixed; inset: 0; z-index: -1; background: #000; transition: 0.8s; pointer-events: none; }
        @keyframes pulse-scanning { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes pulse-match { from { transform: scale(1); } to { transform: scale(1.3); } }
    </style>
</head>
<body>

    <audio id="match-sound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb630cc098.mp3" preload="auto"></audio>

    <div id="inquiry-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="letter-spacing:5px; margin:0; font-weight: 900;">INFO & HELP</h2>
            <div onclick="toggleInquiry()" style="cursor:pointer; background:rgba(255,255,255,0.1); border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center;">✕</div>
        </div>
        <div class="inquiry-card">
            <h4 style="color:var(--accent); margin:0 0 10px 0;">HOW TO USE</h4>
            <p style="font-size:12px; opacity:0.8; line-height:1.6;">Point your camera at the physical markers. When a match is found, info will pop up!</p>
        </div>
    </div>

    <div id="webview-container">
        <div style="background:#111; padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333;">
            <span id="web-title" style="color:var(--accent); font-weight:900;">STATION INFO</span>
            <button onclick="closeWebView()" style="background:none; border: 1px solid #444; color:white; padding: 5px 15px; border-radius: 20px;">CLOSE</button>
        </div>
        <iframe id="web-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="home-page" class="overlay-screen">
        <h1 style="font-size:48px; margin:0; letter-spacing:8px; font-weight:900;">BAG<span style="color:var(--accent)">VIEW</span></h1>
        <p style="color:#555; letter-spacing:5px; font-size:10px;">ENVIRONMENTAL AR GUIDE</p>
        <button onclick="goToTutorial()" style="background:var(--accent); border:none; padding:18px 60px; border-radius:50px; font-weight:900; margin-top:100px; cursor:pointer;">EXPLORE</button>
    </div>

    <div id="tutorial-page" class="overlay-screen hidden">
        <div class="video-container"><video id="tut-video" class="tut-vid" playsinline><source src="Assets/tutorial.mp4" type="video/mp4"></video></div>
        <div class="skip-fab" onclick="finishTutorial()">SKIP TUTORIAL ➔</div>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="top-nav">
            <div class="gps-display" id="status-container">
                <div class="pulse" id="status-pulse"></div>
                <div id="gps-status" style="font-size:11px; font-weight:900; letter-spacing:1px;">CAMERA: STANDBY</div>
            </div>
        </div>
        <div class="bottom-area">
            <div class="bottom-dock" id="gallery-hud">
                <div class="drag-handle" onclick="document.getElementById('gallery-hud').classList.toggle('expanded')"><div class="handle-bar"></div></div>
                <div class="scroll-container" id="gallery-root"></div>
            </div>
            <div class="nav-bar">
                <div class="icon-btn" onclick="toggleInquiry()"><svg viewBox="0 0 24 24" width="22" fill="#fff"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg></div>
                <div class="cam-btn" id="cam-toggle" onclick="toggleScanner()"><svg viewBox="0 0 24 24" width="32" fill="white" id="cam-icon"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
                <div class="icon-btn" onclick="location.reload()"><svg viewBox="0 0 24 24" width="22" fill="#fff"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></div>
            </div>
        </div>
    </div>

    <div id="shutter"></div>

    <a-scene id="ar-scene" mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
        // 1. FIREBASE CONFIG (REPLACE WITH YOURS)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abcd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ANALYTICS ENGINE
        const analytics = {
            sessionID: 'User-' + Math.random().toString(36).substr(2, 5),
            activeStation: null,
            openTime: null,
            logEvent(stationName, eventType, extra = {}) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    db.ref('stats').push({
                        userId: this.sessionID, station: stationName, event: eventType,
                        location: `${pos.coords.latitude}, ${pos.coords.longitude}`,
                        timestamp: new Date().toISOString(), ...extra
                    });
                }, () => {
                    db.ref('stats').push({
                        userId: this.sessionID, station: stationName, event: eventType,
                        location: "GPS Denied", timestamp: new Date().toISOString(), ...extra
                    });
                });
            },
            startDwell(name) { this.activeStation = name; this.openTime = Date.now(); this.logEvent(name, 'scan'); },
            endDwell() {
                if (this.activeStation && this.openTime) {
                    const dur = Math.round((Date.now() - this.openTime) / 1000);
                    if (dur > 1) this.logEvent(this.activeStation, 'dwell', { duration: dur });
                    this.activeStation = null; this.openTime = null;
                }
            }
        };

        // 3. STATION DATA
        const stations = [
            { name: "Map", thumb: "Assets/A1_Map.jpg", link: "https://jmflorencio.github.io/BagView_Botanical_Map/" },
            { name: "Arbor", thumb: "Assets/Arbor.png", link: "https://tour.panoee.net/69b7b676cd5918466513b640" },
            { name: "Cactus & Succulents", thumb: "Assets/Cactus&Succulents.png", link: "https://tour.panoee.net/69b7b991cd59184ead13b71f" },
            { name: "Chinese Garden", thumb: "Assets/Chinese%20Garden.png", link: "https://tour.panoee.net/69b74a8ccd5918bff013a943" },
            { name: "Friendship Garden", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png", link: "https://tour.panoee.net/69b7b820a3e4d78d0cc8db9e" },
            { name: "Cordillera Village", thumb: "Assets/Cordillera%20Village.png", link: "https://tour.panoee.net/69b7b964a3e4d75529c8dc1a" },
            { name: "Greenhouse", thumb: "Assets/Greenhouse.png", link: "https://tour.panoee.net/69b7b91fa3e4d7ebe6c8dbfe" },
            { name: "Japanese Garden", thumb: "Assets/Japanese%20Garden.png", link: "https://tour.panoee.net/69b7b63aa3e4d733edc8db51" },
            { name: "Japanese Tunnel", thumb: "Assets/Japanese%20Tunnel.png", link: "https://tour.panoee.net/69b7b616a3e4d72922c8db49" },
            { name: "Korea Garden", thumb: "Assets/Korea%20Garden.png", link: "https://tour.panoee.net/69aa67e9add064456619ce3d/69aa73d3add0647cc419cf6d" },
            { name: "Orchidarium", thumb: "Assets/Orchidarium.png", link: "https://tour.panoee.net/69b184dfa0e1d16f1a9e388d/69b187aba0e1d18afb9e38fb" },
            { name: "PMSEA Garden", thumb: "Assets/PMSEA%20Garden.png", link: "https://tour.panoee.net/69b7b586a3e4d741fdc8db26" }
        ];

        // 4. CORE FUNCTIONS
        function buildUI() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}" onclick="handleCardTap(${i})">
                    <div style="height:75%; background:#1a1a1a; overflow:hidden;"><img src="${s.thumb}" style="width:100%; height:100%; object-fit:cover;"></div>
                    <div style="font-size:8px; text-align:center; padding:8px 4px; font-weight:bold; color:#fff; text-transform:uppercase;">${s.name}</div>
                </div>`).join('');
        }

        function handleCardTap(index) {
            document.querySelectorAll('.station-card').forEach(c => c.classList.remove('react'));
            const card = document.getElementById(`card-${index}`);
            card.classList.add('react');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function updateStatusUI(type) {
            const statusBox = document.getElementById('status-container');
            const statusPulse = document.getElementById('status-pulse');
            const statusText = document.getElementById('gps-status');
            statusBox.className = 'gps-display'; statusPulse.className = 'pulse';
            if (type === 'scanning') { statusBox.classList.add('status-live'); statusPulse.classList.add('live'); statusText.innerText = "SCANNING..."; statusText.style.color = "var(--scanning)"; }
            else if (type === 'match') { statusBox.classList.add('status-match'); statusPulse.classList.add('match'); statusText.innerText = "MATCH FOUND!"; statusText.style.color = "var(--accent)"; }
            else { statusText.innerText = "CAMERA: STANDBY"; statusText.style.color = "#fff"; }
        }

        function setupTracking() {
            const container = document.getElementById('target-container');
            stations.forEach((s, i) => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
                entity.addEventListener("targetFound", () => {
                    document.getElementById('match-sound').play();
                    updateStatusUI('match');
                    document.getElementById('gallery-hud').classList.add('expanded');
                    handleCardTap(i);
                    analytics.startDwell(s.name);
                    openStation(i);
                });
                entity.addEventListener("targetLost", () => updateStatusUI('scanning'));
                container.appendChild(entity);
            });
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            const sceneEl = document.querySelector('a-scene');
            if(!btn.classList.contains('active')) {
                try {
                    await sceneEl.systems['mindar-image-system'].start();
                    btn.classList.add('active'); updateStatusUI('scanning');
                    document.getElementById('shutter').style.display = 'none';
                } catch (e) { alert("Camera Error"); }
            } else {
                sceneEl.systems['mindar-image-system'].stop();
                btn.classList.remove('active'); updateStatusUI('standby');
                document.getElementById('shutter').style.display = 'block';
            }
        }

        function openStation(i) {
            document.getElementById('web-frame').src = stations[i].link;
            document.getElementById('web-title').innerText = stations[i].name.toUpperCase();
            document.getElementById('webview-container').style.display = 'flex';
        }

        function closeWebView() { analytics.endDwell(); document.getElementById('webview-container').style.display = 'none'; document.getElementById('web-frame').src = ''; }
        function toggleInquiry() { const p = document.getElementById('inquiry-panel'); p.style.display = (p.style.display === 'flex') ? 'none' : 'flex'; }
        function goToTutorial() { document.getElementById('home-page').classList.add('hidden'); document.getElementById('tutorial-page').classList.remove('hidden'); document.getElementById('tut-video').play(); }
        function finishTutorial() { document.getElementById('tutorial-page').classList.add('hidden'); document.getElementById('ui-layer').classList.remove('hidden'); buildUI(); setupTracking(); }
    </script>
</body>
</html>
