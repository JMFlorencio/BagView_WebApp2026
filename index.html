<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGVIEW | AR Eco-Tourism</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        :root { --accent: #00ff88; --scanning: #ffaa00; --error: #ff4444; --glass: rgba(0, 0, 0, 0.75); --blur: blur(20px); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Video Background Fix */
        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: -5 !important; }
        
        .overlay-screen { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.8s ease; }
        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }

        /* UI Elements */
        .top-nav { position: absolute; top: 0; width: 100%; padding: 30px 20px; z-index: 100; }
        .gps-display { background: var(--glass); backdrop-filter: var(--blur); padding: 10px 18px; border-radius: 12px; display: inline-flex; align-items: center; gap: 10px; border-left: 3px solid #444; }
        
        .bottom-dock { position: fixed; bottom: 0; width: 100%; background: linear-gradient(to top, #000 85%, transparent); transform: translateY(calc(100% - 45px)); transition: 0.5s; z-index: 120; }
        .bottom-dock.expanded { transform: translateY(0); }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 20px 100px; }
        
        .station-card { min-width: 110px; height: 140px; background: #111; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .station-card.active { border-color: var(--accent); transform: translateY(-5px); }

        .nav-bar { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 150; pointer-events: none; }
        .icon-btn, .cam-btn { pointer-events: auto; }
        .cam-btn { width: 70px; height: 70px; border-radius: 50%; background: #000; border: 3px solid #333; display: flex; align-items: center; justify-content: center; }
        .cam-btn.active { border-color: var(--accent); }

        #webview-container { position: fixed; inset: 0; z-index: 5000; background: #000; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <audio id="match-sound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb630cc098.mp3" preload="auto"></audio>

    <div id="home-page" class="overlay-screen">
        <h1 style="font-size:42px; letter-spacing:8px; font-weight:900;">BAG<span style="color:var(--accent)">VIEW</span></h1>
        <p style="font-size:10px; letter-spacing:4px; opacity:0.6;">ECO-TOURISM AR EXPERIENCE</p>
        <button onclick="finishTutorial()" style="background:var(--accent); border:none; padding:15px 50px; border-radius:50px; font-weight:900; margin-top:50px;">START EXPLORING</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="top-nav">
            <div class="gps-display" id="status-box">
                <div id="status-dot" style="width:8px; height:8px; border-radius:50%; background:#444;"></div>
                <span id="status-text" style="font-size:10px; font-weight:900; letter-spacing:1px;">CAMERA READY</span>
            </div>
        </div>

        <div class="bottom-dock" id="gallery-hud">
            <div style="height:45px; display:flex; justify-content:center; align-items:center;" onclick="document.getElementById('gallery-hud').classList.toggle('expanded')">
                <div style="width:40px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px;"></div>
            </div>
            <div class="scroll-container" id="gallery-root"></div>
        </div>

        <div class="nav-bar">
            <div class="cam-btn" id="cam-toggle" onclick="toggleScanner()">
                <svg viewBox="0 0 24 24" width="30" fill="white"><path d="M12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm7-4h-2.69l-1.83-2H9.52l-1.83 2H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-7 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
            </div>
        </div>
    </div>

    <div id="webview-container">
        <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center;">
            <span id="web-title" style="font-weight:900; color:var(--accent);">STATION</span>
            <button onclick="closeWebView()" style="background:#333; color:#fff; border:none; padding:8px 20px; border-radius:20px;">BACK TO AR</button>
        </div>
        <iframe id="web-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" embedded renderer="transparent: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="target-container"></a-entity>
    </a-scene>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abcd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 12 STATION DATA (Synced with Admin)
        const stations = [
            { name: "Botanical Map", thumb: "Assets/A1_Map.jpg", link: "https://jmflorencio.github.io/BagView_Botanical_Map/" },
            { name: "Japanese Tunnel", thumb: "Assets/Japanese%20Tunnel.png", link: "https://tour.panoee.net/69b7b616a3e4d72922c8db49" },
            { name: "Japanese Garden", thumb: "Assets/Japanese%20Garden.png", link: "https://tour.panoee.net/69b7b63aa3e4d733edc8db51" },
            { name: "Chinese Garden", thumb: "Assets/Chinese%20Garden.png", link: "https://tour.panoee.net/69b74a8ccd5918bff013a943" },
            { name: "Korea Garden", thumb: "Assets/Korea%20Garden.png", link: "https://tour.panoee.net/69aa67e9add064456619ce3d/69aa73d3add0647cc419cf6d" },
            { name: "Arbor", thumb: "Assets/Arbor.png", link: "https://tour.panoee.net/69b7b676cd5918466513b640" },
            { name: "Cactus & Succulents", thumb: "Assets/Cactus&Succulents.png", link: "https://tour.panoee.net/69b7b991cd5918ead13b71f" },
            { name: "Friendship Garden", thumb: "Assets/City%20of%20Vaughan%20Friendship%20Garden.png", link: "https://tour.panoee.net/69b7b820a3e4d78d0cc8db9e" },
            { name: "Cordillera Village", thumb: "Assets/Cordillera%20Village.png", link: "https://tour.panoee.net/69b7b964a3e4d75529c8dc1a" },
            { name: "Greenhouse", thumb: "Assets/Greenhouse.png", link: "https://tour.panoee.net/69b7b91fa3e4d7ebe6c8dbfe" },
            { name: "Orchidarium", thumb: "Assets/Orchidarium.png", link: "https://tour.panoee.net/69b184dfa0e1d16f1a9e388d/69b187aba0e1d18afb9e38fb" },
            { name: "PMSEA Garden", thumb: "Assets/PMSEA%20Garden.png", link: "https://tour.panoee.net/69b7b586a3e4d741fdc8db26" }
        ];

        // 3. ANALYTICS (Syncs with Dashboard)
        const analytics = {
            sessionID: 'BAG-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
            activeStation: null,
            startTime: null,

            log(station, event, extra = {}) {
                const data = {
                    userId: this.sessionID,
                    station: station,
                    event: event,
                    timestamp: new Date().toISOString(),
                    ...extra
                };
                
                // Get Location
                navigator.geolocation.getCurrentPosition(
                    p => { 
                        data.location = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`; 
                        db.ref('stats').push(data);
                    },
                    () => { 
                        data.location = "Baguio City (Approx)"; 
                        db.ref('stats').push(data);
                    },
                    { timeout: 5000 }
                );
            }
        };

        // 4. UI FUNCTIONS
        function finishTutorial() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            initApp();
        }

        function initApp() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = stations.map((s, i) => `
                <div class="station-card" id="card-${i}" onclick="openStation(${i})">
                    <img src="${s.thumb}" style="width:100%; height:70%; object-fit:cover;">
                    <div style="font-size:8px; padding:10px; text-align:center; font-weight:900;">${s.name}</div>
                </div>
            `).join('');
            setupAR();
        }

        function setupAR() {
            const container = document.getElementById('target-container');
            stations.forEach((s, i) => {
                const entity = document.createElement('a-entity');
                entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
                entity.addEventListener("targetFound", () => {
                    document.getElementById('match-sound').play();
                    document.getElementById('status-text').innerText = "STATION MATCHED!";
                    document.getElementById('status-dot').style.background = "var(--accent)";
                    openStation(i);
                });
                entity.addEventListener("targetLost", () => {
                    document.getElementById('status-text').innerText = "SCANNING...";
                    document.getElementById('status-dot').style.background = "var(--scanning)";
                });
                container.appendChild(entity);
            });
        }

        async function toggleScanner() {
            const btn = document.getElementById('cam-toggle');
            const scene = document.querySelector('a-scene');
            if(!btn.classList.contains('active')) {
                await scene.systems['mindar-image-system'].start();
                btn.classList.add('active');
                document.getElementById('status-text').innerText = "SCANNING...";
                document.getElementById('status-dot').style.background = "var(--scanning)";
            } else {
                scene.systems['mindar-image-system'].stop();
                btn.classList.remove('active');
                document.getElementById('status-text').innerText = "CAMERA OFF";
                document.getElementById('status-dot').style.background = "#444";
            }
        }

        function openStation(i) {
            analytics.activeStation = stations[i].name;
            analytics.startTime = Date.now();
            analytics.log(stations[i].name, 'scan');

            document.getElementById('web-frame').src = stations[i].link;
            document.getElementById('web-title').innerText = stations[i].name;
            document.getElementById('webview-container').style.display = 'flex';
        }

        function closeWebView() {
            if (analytics.activeStation && analytics.startTime) {
                const duration = Math.round((Date.now() - analytics.startTime) / 1000);
                if (duration > 2) {
                    analytics.log(analytics.activeStation, 'dwell', { duration: duration });
                }
            }
            document.getElementById('webview-container').style.display = 'none';
            document.getElementById('web-frame').src = '';
        }
    </script>
</body>
</html>
